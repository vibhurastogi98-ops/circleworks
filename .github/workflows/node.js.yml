name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Prevent CI environments from treating Next.js/React warnings as errors
      CI: false
      # Add safe defaults / fallback values for environment variables so build completes
      ANTHROPIC_API_KEY: "dummy_fallback_key"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm install
      - run: npm run build
      - name: Lighthouse CI
        if: github.event_name == 'pull_request'
        run: npm run lhci

  security-headers:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    env:
      SECURITY_HEADERS_TARGET: ${{ vars.SECURITY_HEADERS_TARGET || 'https://app.circleworks.com' }}
      SECURITY_HEADERS_REQUIRED_GRADE: ${{ vars.SECURITY_HEADERS_REQUIRED_GRADE || 'A+' }}
      MOZILLA_OBSERVATORY_HOST: ${{ vars.MOZILLA_OBSERVATORY_HOST || 'app.circleworks.com' }}
      ENFORCE_EXTERNAL_SECURITY_SCANS: ${{ vars.ENFORCE_EXTERNAL_SECURITY_SCANS || 'false' }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate configured security headers
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          config = Path("next.config.ts").read_text()
          required_headers = [
              "Content-Security-Policy",
              "Permissions-Policy",
              "Referrer-Policy",
              "Strict-Transport-Security",
              "X-Content-Type-Options",
              "X-DNS-Prefetch-Control",
              "X-Frame-Options",
              "X-XSS-Protection",
          ]
          missing = [header for header in required_headers if f'key: "{header}"' not in config]
          if missing:
              raise SystemExit(f"Missing configured security headers: {', '.join(missing)}")

          if "poweredByHeader: false" not in config:
              raise SystemExit("Next.js poweredByHeader must stay disabled")

          hsts_match = re.search(
              r'key:\s*"Strict-Transport-Security",\s*value:\s*"([^"]+)"',
              config,
              re.S,
          )
          if not hsts_match:
              raise SystemExit("Strict-Transport-Security header value is missing")

          hsts = hsts_match.group(1)
          max_age_match = re.search(r"max-age=(\d+)", hsts)
          max_age = int(max_age_match.group(1)) if max_age_match else 0
          if max_age < 31536000 or "includeSubDomains" not in hsts or "preload" not in hsts:
              raise SystemExit("Strict-Transport-Security must include max-age>=31536000, includeSubDomains, and preload")

          print("Configured security headers are present.")
          PY

      - name: SecurityHeaders.com scan
        env:
          SECURITY_HEADERS_API_KEY: ${{ secrets.SECURITY_HEADERS_API_KEY }}
        run: |
          ENFORCE_EXTERNAL_SECURITY_SCANS_NORMALIZED="$(printf '%s' "${ENFORCE_EXTERNAL_SECURITY_SCANS:-}" | tr '[:upper:]' '[:lower:]')"
          echo "Scanning $SECURITY_HEADERS_TARGET with securityheaders.com; target rating: $SECURITY_HEADERS_REQUIRED_GRADE"
          if [ -z "${SECURITY_HEADERS_API_KEY:-}" ]; then
            MESSAGE="SECURITY_HEADERS_API_KEY is not configured; skipping SecurityHeaders.com API scan. The HTML scanner blocks CI with 403."
            if [ "$ENFORCE_EXTERNAL_SECURITY_SCANS_NORMALIZED" = "true" ]; then
              echo "::error::$MESSAGE"
              exit 1
            fi
            echo "::warning::$MESSAGE"
            exit 0
          fi

          if ! curl --fail --silent --show-error --location \
            --header "x-api-key: ${SECURITY_HEADERS_API_KEY}" \
            --get "https://api.securityheaders.com/" \
            --data-urlencode "q=${SECURITY_HEADERS_TARGET}" \
            --data "hide=on" \
            --data "followRedirects=on" \
            --output securityheaders.json; then
            MESSAGE="SecurityHeaders.com API scan failed for ${SECURITY_HEADERS_TARGET}."
            if [ "$ENFORCE_EXTERNAL_SECURITY_SCANS_NORMALIZED" = "true" ]; then
              echo "::error::$MESSAGE"
              exit 1
            fi
            echo "::warning::$MESSAGE"
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          result = json.loads(Path("securityheaders.json").read_text())
          value = result.get("summary", {}).get("grade")
          required = os.environ.get("SECURITY_HEADERS_REQUIRED_GRADE", "A+").strip().upper()
          enforced = os.environ.get("ENFORCE_EXTERNAL_SECURITY_SCANS", "").lower() == "true"
          if not value:
              message = "Could not determine securityheaders.com grade from response"
              if enforced:
                  raise SystemExit(message)
              print(f"::warning::{message}")
              sys.exit(0)

          value = value.strip().upper()
          print(f"securityheaders.com grade: {value}")
          if value != required:
              message = f"securityheaders.com target rating is {required}, got {value}"
              if enforced:
                  raise SystemExit(message)
              print(f"::warning::{message}")
          PY

      - name: Mozilla Observatory scan
        run: |
          ENFORCE_EXTERNAL_SECURITY_SCANS_NORMALIZED="$(printf '%s' "${ENFORCE_EXTERNAL_SECURITY_SCANS:-}" | tr '[:upper:]' '[:lower:]')"
          echo "Scanning $MOZILLA_OBSERVATORY_HOST with Mozilla Observatory; target rating: $SECURITY_HEADERS_REQUIRED_GRADE"
          if ! curl --fail --silent --show-error --request POST \
            "https://observatory-api.mdn.mozilla.net/api/v2/scan?host=${MOZILLA_OBSERVATORY_HOST}" \
            --output mozilla-observatory.json; then
            MESSAGE="Mozilla Observatory scan failed for ${MOZILLA_OBSERVATORY_HOST}."
            if [ "$ENFORCE_EXTERNAL_SECURITY_SCANS_NORMALIZED" = "true" ]; then
              echo "::error::$MESSAGE"
              exit 1
            fi
            echo "::warning::$MESSAGE"
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          result = json.loads(Path("mozilla-observatory.json").read_text())
          grade = result.get("grade")
          required = os.environ.get("SECURITY_HEADERS_REQUIRED_GRADE", "A+").strip().upper()
          enforced = os.environ.get("ENFORCE_EXTERNAL_SECURITY_SCANS", "").lower() == "true"
          print(f"Mozilla Observatory grade: {grade}")
          if grade != required:
              message = f"Mozilla Observatory target rating is {required}, got {grade}"
              if enforced:
                  raise SystemExit(message)
              print(f"::warning::{message}")
          PY

  bundle-analysis:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm install
      - run: npm run analyze
      - run: npm run check:bundle-budget

      - uses: actions/upload-artifact@v4
        with:
          name: next-bundle-analysis
          path: .next/analyze/*.html
