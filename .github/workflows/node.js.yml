# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Prevent CI environments from treating Next.js/React warnings as errors
      CI: false
      # Add safe defaults / fallback values for environment variables so build completes
      ANTHROPIC_API_KEY: "dummy_fallback_key"

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        
    - run: npm install
    - run: npm run build
